providers = ["php"]

[variables]
COMPOSER_ALLOW_SUPERUSER = "1"

[phases.setup]
nixPkgs = [
  "php84",
  "php84Packages.composer",
  "php84Extensions.pdo",
  "php84Extensions.pdo_sqlite",
  "php84Extensions.pdo_pgsql",
  "php84Extensions.sqlite3",
  "php84Extensions.mbstring",
  "php84Extensions.tokenizer",
  "php84Extensions.xml",
  "php84Extensions.curl",
  "php84Extensions.gd",
  "php84Extensions.zip",
  "php84Extensions.bcmath",
  "php84Extensions.openssl",
  "php84Extensions.fileinfo"
]

[phases.install]
cmds = [
  "composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist",
  "mkdir -p database storage/framework/sessions storage/framework/views storage/framework/cache storage/logs bootstrap/cache",
  "touch database/database.sqlite",
  "chmod -R 775 storage bootstrap/cache database"
]

[phases.build]
cmds = ["echo 'Build PHP 8.4 listo'"]

[start]
cmd = "bash start.sh"
