[phases.setup]
nixPkgs = ["php84", "php84Extensions.pdo_sqlite", "php84Extensions.pdo_pgsql", "php84Extensions.sqlite3", "php84Extensions.mbstring", "php84Extensions.tokenizer", "php84Extensions.xml", "php84Extensions.curl", "php84Extensions.gd", "php84Extensions.zip", "php84Extensions.bcmath", "composer"]

[phases.install]
cmds = [
  "composer install --no-dev --optimize-autoloader --no-interaction",
  "mkdir -p database storage/framework/sessions storage/framework/views storage/framework/cache storage/logs bootstrap/cache",
  "touch database/database.sqlite",
  "chmod -R 775 storage bootstrap/cache database"
]

[start]
cmd = "bash start.sh"
